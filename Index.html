<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskGram - AI Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
        .page { display: none; height: 100vh; width: 100%; }
        .active { display: block; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .overlay { position: absolute; bottom: 100px; left: 20px; z-index: 10; }
        .side-bar { position: absolute; bottom: 120px; right: 20px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div id="feed" class="reels-container">
            <div class="reel">
                <div class="text-center p-10">
                    <h2 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">AskGram AI</h2>
                    <p class="text-gray-500 mt-2">Swipe up to see magic ✨</p>
                </div>
            </div>
        </div>
    </div>

    <div id="studio" class="page fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-8 rounded-[40px] text-center">
            <h2 class="text-xl font-bold mb-6">Create AI Reel</h2>
            <textarea id="prompt" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-6 outline-none focus:border-purple-500" rows="4" placeholder="Describe your video idea..."></textarea>
            <div class="flex gap-4">
                <button onclick="tab('home')" class="flex-1 py-4 bg-gray-800 rounded-2xl font-bold">Cancel</button>
                <button onclick="createMagic()" id="magicBtn" class="flex-1 py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold">Generate ✨</button>
            </div>
        </div>
    </div>

    <div id="profile" class="page p-6 flex flex-col items-center justify-center text-white">
        <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-yellow-400 to-red-500 p-1 mb-4">
            <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-3xl font-bold italic">M</div>
        </div>
        <h2 class="text-2xl font-black mb-10">Manan @AskGram</h2>
        
        <div class="glass w-full p-8 rounded-[40px] text-center">
            <p class="text-xs font-bold text-green-400 uppercase tracking-widest mb-2">Total Earnings</p>
            <h3 id="earnings" class="text-5xl font-mono font-black mb-6">$0.00</h3>
            <button class="w-full py-4 bg-green-600 rounded-2xl font-bold shadow-lg shadow-green-500/20">Withdraw Money</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/50 backdrop-blur-md border-t border-white/5 flex justify-around py-6 text-2xl z-[110]">
        <i onclick="tab('home')" class="fa-solid fa-house cursor-pointer"></i>
        <i class="fa-solid fa-magnifying-glass text-gray-600"></i>
        <i onclick="tab('studio')" class="fa-solid fa-square-plus text-purple-500 cursor-pointer"></i>
        <i class="fa-solid fa-clapperboard text-gray-600"></i>
        <i onclick="tab('profile')" class="fa-solid fa-circle-user cursor-pointer text-gray-600"></i>
    </nav>

    <script>
        let balance = 0.00;

        function tab(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(name).classList.add('active');
        }

        function createMagic() {
            const p = document.getElementById('prompt');
            const b = document.getElementById('magicBtn');
            if(!p.value.trim()) return alert("Idea likho!");

            b.innerText = "AI Processing...";
            b.disabled = true;

            setTimeout(() => {
                const feed = document.getElementById('feed');
                const reel = document.createElement('div');
                reel.className = "reel";
                reel.innerHTML = `
                    <div class="p-10 text-center">
                        <p class="text-xl font-semibold">${p.value}</p>
                        <p class="text-xs text-purple-500 mt-4 uppercase tracking-widest">AI Generated Reel 🎥</p>
                    </div>
                    <div class="side-bar">
                        <i onclick="this.classList.toggle('text-red-500')" class="fa-solid fa-heart cursor-pointer"></i>
                        <i class="fa-solid fa-comment"></i>
                        <i class="fa-solid fa-share"></i>
                    </div>
                `;
                feed.prepend(reel);
                
                balance += 1.50;
                document.getElementById('earnings').innerText = "$" + balance.toFixed(2);
                
                tab('home');
                p.value = "";
                b.innerText = "Generate ✨";
                b.disabled = false;
                feed.scrollTo(0, 0);
            }, 2000);
        }
    </script>
</body>
</html>
