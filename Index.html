<script>
const API_KEY = "YOUR_GOOGLE_API_KEY";

let isLoading = false;

async function openAI() {
  if(isLoading) return;
  
  const idea = document.getElementById("prompt").value.trim();
  if(!idea) return showMessage("Idea likho pehle!");

  isLoading = true;
  document.getElementById("magicBtn").innerText = "Generating...";
  document.getElementById("magicBtn").disabled = true;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: idea }] }]
        })
      }
    );

    const data = await response.json();

    if(!data.candidates){
      throw new Error("AI failed");
    }

    const result = data.candidates[0].content.parts[0].text;
    addPost(result);

  } catch (err) {
    showMessage("Server busy ya API error 😢");
  }

  isLoading = false;
  document.getElementById("magicBtn").innerText = "GENERATE MAGIC ✨";
  document.getElementById("magicBtn").disabled = false;
}

function addPost(text){
  const feed = document.getElementById("feed");
  const post = document.createElement("div");
  post.className = "bg-gray-900 p-5 rounded-2xl border border-gray-800";
  post.innerHTML = `<p class="text-sm">${text}</p>`;
  feed.prepend(post);
}

function showMessage(msg){
  document.getElementById("messageBox").innerText = msg;
  document.getElementById("messageBox").classList.remove("hidden");
  setTimeout(()=>{
    document.getElementById("messageBox").classList.add("hidden");
  },2000);
}
</script>
<div id="messageBox" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-red-600 px-6 py-3 rounded-xl text-sm shadow-lg z-50">
Message
</div>
