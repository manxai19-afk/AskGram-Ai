<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskGram - AI Social Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .glow-btn { box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-black/80 z-50">
        <h1 class="text-2xl font-black bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 bg-clip-text text-transparent italic">AskGram</h1>
        <div class="flex gap-6 text-xl text-gray-300">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-brands fa-facebook-messenger"></i>
        </div>
    </header>

    <main class="h-screen overflow-y-auto pb-32">
        
        <div id="home" class="page active">
            <div id="feed" class="space-y-1">
                <div class="relative h-[80vh] w-full bg-gray-900 flex items-center justify-center border-b border-gray-800">
                    <i class="fa-solid fa-play text-6xl text-gray-800 opacity-50"></i>
                    <div class="absolute bottom-10 left-5">
                        <p class="font-bold text-sm">@askgram_ai</p>
                        <p class="text-xs text-gray-300 mt-1">AI generating the future... ✨</p>
                    </div>
                    <div class="absolute bottom-10 right-5 flex flex-col gap-6 text-2xl items-center">
                        <i class="fa-solid fa-heart text-white"></i>
                        <i class="fa-solid fa-comment text-white"></i>
                        <i class="fa-solid fa-share text-white"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="studio" class="page p-6">
            <div class="glass p-8 rounded-[40px] border border-gray-800 mt-10 glow-btn">
                <h2 class="text-xl font-black mb-6 text-center">AI Video Creation</h2>
                <textarea id="prompt" class="w-full bg-transparent border-b border-gray-700 py-4 text-lg focus:border-purple-500 outline-none transition mb-8" placeholder="What's your viral idea?"></textarea>
                <button onclick="createMagic()" id="magicBtn" class="w-full bg-white text-black py-4 rounded-full font-bold text-lg active:scale-95 transition">
                    Generate & Post ✨
                </button>
            </div>
        </div>

        <div id="profile" class="page p-6">
            <div class="flex flex-col items-center mt-10">
                <div class="w-24 h-24 rounded-full bg-gradient-to-br from-purple-600 to-orange-500 p-1 mb-4">
                    <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-3xl font-bold italic">M</div>
                </div>
                <h2 class="text-2xl font-black">Manan</h2>
                <p class="text-gray-500 text-sm mb-10">Creator ID: 287383</p>

                <div class="w-full glass p-8 rounded-[40px] border border-green-900/20 text-center">
                    <p class="text-xs text-green-500 font-bold tracking-widest uppercase mb-2">Available Balance</p>
                    <h3 id="earnings" class="text-5xl font-black font-mono">$0.00</h3>
                    <button class="mt-8 w-full bg-green-600 py-4 rounded-3xl font-bold">Withdraw to Bank</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-gray-900 flex justify-around py-5 text-2xl z-50">
        <i onclick="tab('home')" id="h-btn" class="fa-solid fa-house cursor-pointer text-white"></i>
        <i onclick="tab('studio')" id="s-btn" class="fa-solid fa-square-plus cursor-pointer text-gray-600"></i>
        <i onclick="tab('profile')" id="p-btn" class="fa-solid fa-circle-user cursor-pointer text-gray-600"></i>
    </nav>

    <script>
        let balance = 0.00;

        function tab(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            
            // Icon Colors
            document.getElementById('h-btn').className = `fa-solid fa-house cursor-pointer ${name==='home'?'text-white':'text-gray-600'}`;
            document.getElementById('s-btn').className = `fa-solid fa-square-plus cursor-pointer ${name==='studio'?'text-white':'text-gray-600'}`;
            document.getElementById('p-btn').className = `fa-solid fa-circle-user cursor-pointer ${name==='profile'?'text-white':'text-gray-600'}`;
        }

        function createMagic() {
            const p = document.getElementById('prompt');
            const b = document.getElementById('magicBtn');
            if(!p.value.trim()) return alert("Idea please!");

            b.innerText = "Gemini AI is Cooking... 🔥";
            b.disabled = true;

            setTimeout(() => {
                const feed = document.getElementById('feed');
                const reel = document.createElement('div');
                reel.className = "relative h-[80vh] w-full bg-gray-900 flex items-center justify-center border-b border-gray-800";
                reel.innerHTML = `<div class='p-10 text-center'><p class='text-sm mb-4'>${p.value}</p><p class='text-[10px] text-gray-500 uppercase tracking-widest'>Video Generated by AI 🎬</p></div>`;
                
                feed.prepend(reel);
                balance += 1.25;
                document.getElementById('earnings').innerText = "$" + balance.toFixed(2);
                
                tab('home');
                p.value = "";
                b.innerText = "Generate & Post ✨";
                b.disabled = false;
            }, 2500);
        }
    </script>
</body>
</html>
