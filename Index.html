<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskGram AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .active { display: block; }
        body { background-color: black; color: white; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-4 border-b border-gray-800 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent italic">AskGram</h1>
        <i class="fa-regular fa-heart text-xl"></i>
    </header>

    <main class="pb-20">
        <div id="home" class="page active p-4">
            <div id="feed" class="space-y-4">
                <div class="bg-gray-900 p-10 rounded-3xl text-center border border-gray-800">
                    <p class="text-gray-400 italic">Welcome to AskGram World Brand ✨</p>
                    <p class="text-xs mt-2 text-gray-600">Swipe up feature coming soon!</p>
                </div>
            </div>
        </div>

        <div id="studio" class="page p-6">
            <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800">
                <h2 class="font-bold mb-4">AI Video Studio</h2>
                <textarea id="prompt" class="w-full bg-black border border-gray-700 rounded-xl p-3 text-sm mb-4 outline-none" rows="4" placeholder="Describe your video idea..."></textarea>
                <button onclick="generateVideo()" id="genBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-3 rounded-xl font-bold">Generate ✨</button>
            </div>
        </div>

        <div id="profile" class="page p-6 text-center">
            <div class="w-20 h-20 bg-gradient-to-tr from-yellow-400 to-pink-500 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl font-bold">M</div>
            <h2 class="text-xl font-bold">Manan</h2>
            <div class="mt-8 bg-gray-900 p-6 rounded-3xl border border-green-900/30">
                <p class="text-xs text-green-500 font-bold uppercase">Balance</p>
                <h3 id="earnings" class="text-4xl font-bold">$0.00</h3>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around py-4 text-2xl">
        <i onclick="show('home')" class="fa-solid fa-house cursor-pointer"></i>
        <i onclick="show('studio')" class="fa-solid fa-square-plus text-purple-500 cursor-pointer"></i>
        <i onclick="show('profile')" class="fa-solid fa-circle-user cursor-pointer text-gray-600"></i>
    </nav>

    <script>
        let money = 0;

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function generateVideo() {
            const p = document.getElementById('prompt');
            const btn = document.getElementById('genBtn');
            if(!p.value.trim()) return alert("Idea likho!");

            btn.innerText = "AI Thinking...";
            
            setTimeout(() => {
                const feed = document.getElementById('feed');
                const post = document.createElement('div');
                post.className = "bg-gray-900 p-5 rounded-3xl border border-gray-800 mb-4";
                post.innerHTML = `<p class='text-sm mb-4'>${p.value}</p><div class='h-40 bg-black rounded-2xl flex items-center justify-center italic text-gray-700'>Video Processing... 🎥</div>`;
                
                feed.prepend(post);
                money += 1.00;
                document.getElementById('earnings').innerText = "$" + money.toFixed(2);
                
                p.value = "";
                btn.innerText = "Generate ✨";
                show('home');
            }, 1500);
        }
    </script>
</body>
</html>
