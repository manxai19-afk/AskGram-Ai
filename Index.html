<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AskGram - Ultra Secure Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body,html{margin:0;padding:0;height:100%;background:#000;color:#fff;font-family:-apple-system,sans-serif;overflow:hidden}
.page{display:none;height:100vh;width:100%;position:fixed;top:0;left:0;background:#000;overflow-y:auto;z-index:50}
.active-page{display:block;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reels-container{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.reel{height:100vh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #111}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)}
.story-circle{min-width:62px;height:62px;border-radius:50%;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);padding:2px}
.story-inner{width:100%;height:100%;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid #000}
</style>
</head>
<body>

<div class="fixed top-4 left-0 w-full flex gap-4 px-4 overflow-x-auto z-[60] no-scrollbar">
    <div class="flex flex-col items-center"><div class="story-circle"><div class="story-inner font-bold text-sm">M</div></div><span class="text-[9px] mt-1">Your Story</span></div>
    <div class="flex flex-col items-center opacity-60"><div class="story-circle"><div class="story-inner"><img src="https://i.pravatar.cc/100?u=9"></div></div><span class="text-[9px] mt-1">Creators</span></div>
</div>

<div id="home-page" class="reels-container active-page">
    <div id="dynamic-feed">
        <div class="reel">
            <div class="text-center p-8">
                <h1 class="text-5xl font-black italic bg-gradient-to-r from-purple-400 to-orange-500 bg-clip-text text-transparent">AskGram</h1>
                <p class="text-xs text-gray-500 mt-4 uppercase tracking-[0.3em]">Secure AI Network</p>
            </div>
            <div class="absolute bottom-24 left-5">
                <p class="font-bold text-sm">@askgram_official <i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i></p>
                <p class="text-xs text-gray-400">Welcome Manan! Your app is now XSS Protected. 🛡️</p>
            </div>
            <div class="absolute bottom-28 right-5 flex flex-col gap-7 items-center text-2xl">
                <i onclick="this.classList.toggle('text-red-500')" class="fa-solid fa-heart cursor-pointer"></i>
                <i onclick="alert('Secure Comments Active')" class="fa-solid fa-comment"></i>
                <i onclick="alert('Link Copied Safely')" class="fa-solid fa-share-nodes"></i>
            </div>
        </div>
    </div>
</div>

<div id="plus-page" class="page flex items-center justify-center p-6">
    <div class="glass w-full max-w-md p-8 rounded-[40px] text-center">
        <h2 class="text-xl font-bold mb-6">Secure AI Studio</h2>
        <textarea id="ai-prompt" class="w-full bg-black/40 border border-white/10 rounded-3xl p-5 mb-6 outline-none text-sm" rows="4" placeholder="Type safely here... @mentions allowed"></textarea>
        <button onclick="createPost()" id="magic-btn" class="w-full bg-white text-black py-4 rounded-3xl font-black transition active:scale-95">SAFE POST ✨</button>
        <p onclick="showTab('home-page')" class="mt-4 text-[10px] text-gray-500 cursor-pointer uppercase tracking-widest">Back to Feed</p>
    </div>
</div>

<div id="profile-page" class="page p-8">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-xl font-black italic text-purple-400">manan_askgram</h2>
        <i class="fa-solid fa-shield-halved text-green-500"></i>
    </div>
    <div class="flex items-center gap-8 mb-10">
        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-600 p-1">
            <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-2xl font-bold">M</div>
        </div>
        <div class="flex gap-8">
            <div class="text-center"><p id="postCount" class="font-bold">24</p><p class="text-[10px] text-gray-500">Posts</p></div>
            <div class="text-center"><p class="font-bold">854k</p><p class="text-[10px] text-gray-500">Followers</p></div>
        </div>
    </div>
    
    <div class="glass p-8 rounded-[35px] mb-8 border-green-500/20">
        <p class="text-green-500 text-[10px] font-bold uppercase tracking-widest mb-2">Secure Wallet</p>
        <h3 id="wallet-amt" class="text-5xl font-black font-mono">$0.00</h3>
    </div>

    <div class="mt-20 text-center opacity-20 text-[9px] uppercase tracking-widest">
        <p>Verified Secure Connection</p>
        <p class="mt-1">© 2026 ASKGRAM WORLD</p>
    </div>
</div>

<nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-white/5 flex justify-around py-6 text-2xl z-[100]">
    <i onclick="showTab('home-page')" id="nav-home" class="fa-solid fa-house text-white"></i>
    <i onclick="showTab('plus-page')" id="nav-plus" class="fa-solid fa-square-plus text-purple-500"></i>
    <i onclick="showTab('profile-page')" id="nav-profile" class="fa-solid fa-circle-user text-gray-600"></i>
</nav>

<script>
let wallet = 0.00;
let posts = 24;

function showTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    if(id !== 'home-page') document.getElementById(id).classList.add('active-page');
    
    document.getElementById('nav-home').classList.replace('text-white', 'text-gray-600');
    document.getElementById('nav-profile').classList.replace('text-white', 'text-gray-600');
    if(id === 'home-page') document.getElementById('nav-home').classList.replace('text-gray-600', 'text-white');
    if(id === 'profile-page') document.getElementById('nav-profile').classList.replace('text-gray-600', 'text-white');
}

function createPost() {
    const prompt = document.getElementById('ai-prompt');
    const btn = document.getElementById('magic-btn');
    const val = prompt.value.trim();

    if(!val) return alert("Kuch likhiye!");

    btn.innerText = "Securing & Posting...";
    btn.disabled = true;

    setTimeout(() => {
        const feed = document.getElementById('dynamic-feed');
        
        // --- YOUR SECURE XSS FIX LOGIC ---
        const reel = document.createElement('div');
        reel.className = "reel";

        const content = document.createElement('div');
        content.className = "p-10 text-center";

        const text = document.createElement('p');
        text.className = "text-2xl font-bold mb-4 leading-tight";
        text.textContent = val; // SAFE

        const tag = document.createElement('span');
        tag.className = "text-[10px] text-purple-400 font-bold uppercase tracking-[0.2em]";
        tag.textContent = "VERIFIED AI CONTENT"; // SAFE

        content.appendChild(text);
        content.appendChild(tag);
        reel.appendChild(content);

        // Sidebar Actions (Pure Static for UI)
        const sidebar = document.createElement('div');
        sidebar.className = "absolute bottom-32 right-5 flex flex-col gap-7 text-2xl";
        sidebar.innerHTML = '<i class="fa-solid fa-heart"></i><i class="fa-solid fa-share text-blue-400"></i>';
        reel.appendChild(sidebar);

        feed.prepend(reel);
        
        // Update Stats
        wallet += 5.50;
        posts++;
        document.getElementById('wallet-amt').innerText = "$" + wallet.toFixed(2);
        document.getElementById('postCount').innerText = posts;

        prompt.value = "";
        btn.innerText = "SAFE POST ✨";
        btn.disabled = false;
        showTab('home-page');
        window.scrollTo(0,0);
    }, 1000);
}
</script>
</body>
</html>
