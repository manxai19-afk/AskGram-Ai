<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskGram - Ultra Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --insta-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #000; z-index: 50; overflow-y: auto; }
        .active-page { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reel { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; }
        .story-ring { width: 68px; height: 68px; border-radius: 50%; background: var(--insta-gradient); padding: 2.5px; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #000; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        nav { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-top: 0.5px solid #222; }
    </style>
</head>
<body>

    <div class="fixed top-12 left-0 w-full flex gap-4 px-5 overflow-x-auto z-[60] no-scrollbar">
        <div class="flex flex-col items-center gap-1.5">
            <div class="story-ring"><div class="story-img font-bold text-lg italic text-white">M</div></div>
            <span class="text-[10px] font-medium">Your Story</span>
        </div>
        <div class="flex flex-col items-center gap-1.5 opacity-80">
            <div class="story-ring"><div class="story-img"><img src="https://i.pravatar.cc/100?u=4"></div></div>
            <span class="text-[10px]">Creators</span>
        </div>
    </div>

    <div id="home-page" class="reels-container active-page">
        <div id="dynamic-feed">
            <div class="reel">
                <div class="text-center p-12">
                    <h1 class="text-6xl font-black italic bg-gradient-to-r from-purple-400 via-pink-500 to-orange-500 bg-clip-text text-transparent tracking-tighter">AskGram</h1>
                    <p class="text-[10px] text-gray-500 mt-6 uppercase tracking-[0.5em] font-bold">The Future is AI</p>
                </div>
                <div class="absolute bottom-32 left-6">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold text-xs italic">A</div>
                        <p class="font-bold text-sm">askgram_official <i class="fa-solid fa-circle-check text-blue-500 ml-1"></i></p>
                    </div>
                    <p class="text-xs text-gray-400 font-medium">Welcome Manan. Your professional AI brand is live! 🚀</p>
                </div>
                <div class="absolute bottom-36 right-6 flex flex-col gap-8 items-center text-2xl">
                    <div class="flex flex-col items-center"><i onclick="this.classList.toggle('text-red-500')" class="fa-solid fa-heart active:scale-125 transition"></i><span class="text-[10px] font-bold mt-1">1.2M</span></div>
                    <div class="flex flex-col items-center"><i onclick="alert('Secure Comments')" class="fa-solid fa-comment"></i><span class="text-[10px] font-bold mt-1">45K</span></div>
                    <div class="flex flex-col items-center"><i onclick="alert('Link Copied')" class="fa-solid fa-share-nodes"></i><span class="text-[10px] font-bold mt-1">Share</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="plus-page" class="page flex items-center justify-center p-8">
        <div class="glass-card w-full max-w-sm p-10 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-8 italic">AI Creator Studio</h2>
            <textarea id="ai-prompt" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 mb-8 outline-none text-sm placeholder-gray-500" rows="5" placeholder="Mention @brand or write your viral idea..."></textarea>
            <button onclick="createPost()" id="magic-btn" class="w-full bg-white text-black py-4 rounded-full font-black text-sm uppercase tracking-widest active:scale-95 transition">Post to Feed ✨</button>
            <p onclick="showTab('home-page')" class="mt-6 text-[11px] text-gray-500 cursor-pointer uppercase font-bold tracking-widest">Cancel</p>
        </div>
    </div>

    <div id="profile-page" class="page p-10">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-black italic tracking-tighter">manan_askgram</h2>
            <i class="fa-solid fa-gear text-xl opacity-50"></i>
        </div>
        <div class="flex items-center gap-10 mb-12">
            <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-600 p-1">
                <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-3xl font-black italic">M</div>
            </div>
            <div class="flex gap-10">
                <div class="text-center font-bold"><p class="text-xl" id="postCount">24</p><p class="text-[10px] text-gray-500 uppercase">Posts</p></div>
                <div class="text-center font-bold"><p class="text-xl">854K</p><p class="text-[10px] text-gray-500 uppercase">Followers</p></div>
            </div>
        </div>

        <div class="glass-card p-10 mb-10 border-green-500/10">
            <div class="flex justify-between items-start mb-4">
                <span class="text-[10px] font-black text-green-500 uppercase tracking-widest">Premium Wallet</span>
                <i class="fa-solid fa-wallet text-green-500"></i>
            </div>
            <h3 id="wallet-amt" class="text-5xl font-black font-mono tracking-tighter">$0.00</h3>
            <button class="w-full mt-10 bg-green-600/20 border border-green-500/30 text-green-400 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Withdraw Cash</button>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="aspect-square rounded-xl bg-white/5 border border-white/5"></div>
            <div class="aspect-square rounded-xl bg-white/5 border border-white/5"></div>
            <div class="aspect-square rounded-xl bg-white/5 border border-white/5"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full flex justify-around py-7 text-2xl z-[100]">
        <i onclick="showTab('home-page')" id="nav-home" class="fa-solid fa-house text-white"></i>
        <i onclick="showTab('plus-page')" id="nav-plus" class="fa-solid fa-square-plus text-purple-500 opacity-80"></i>
        <i onclick="showTab('profile-page')" id="nav-profile" class="fa-solid fa-circle-user text-gray-600"></i>
    </nav>

    <script>
        let wallet = 0.00;
        let posts = 24;

        function showTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(id !== 'home-page') document.getElementById(id).classList.add('active-page');
            
            document.getElementById('nav-home').className = 'fa-solid fa-house ' + (id === 'home-page' ? 'text-white' : 'text-gray-600');
            document.getElementById('nav-profile').className = 'fa-solid fa-circle-user ' + (id === 'profile-page' ? 'text-white' : 'text-gray-600');
        }

        function createPost() {
            const prompt = document.getElementById('ai-prompt');
            const btn = document.getElementById('magic-btn');
            const val = prompt.value.trim();
            if(!val) return alert("Write your viral idea!");

            btn.innerText = "Generating Premium Reel...";
            btn.disabled = true;

            setTimeout(() => {
                const feed = document.getElementById('dynamic-feed');
                const reel = document.createElement('div');
                reel.className = "reel";

                const content = document.createElement('div');
                content.className = "p-12 text-center max-w-sm";

                const text = document.createElement('p');
                text.className = "text-3xl font-black leading-tight mb-6 tracking-tight italic";
                text.textContent = val; // SAFE XSS PROTECTION

                const tag = document.createElement('span');
                tag.className = "text-[10px] text-purple-400 font-black uppercase tracking-[0.4em]";
                tag.textContent = "VERIFIED AI CONTENT";

                content.appendChild(text);
                content.appendChild(tag);
                reel.appendChild(content);

                // Side Actions
                const side = document.createElement('div');
                side.className = "absolute bottom-36 right-6 flex flex-col gap-8 text-2xl opacity-80";
                side.innerHTML = '<i class="fa-solid fa-heart"></i><i class="fa-solid fa-share-nodes text-pink-500"></i>';
                reel.appendChild(side);

                // Handle Overlay
                const userBox = document.createElement('div');
                userBox.className = "absolute bottom-32 left-6";
                userBox.innerHTML = '<p class="font-bold text-sm">@manan_askgram <i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i></p><p class="text-xs text-gray-500">Freshly baked by AI magic.</p>';
                reel.appendChild(userBox);

                feed.prepend(reel);
                wallet += 12.50; // Increased reward for premium
                posts++;
                document.getElementById('wallet-amt').innerText = "$" + wallet.toFixed(2);
                document.getElementById('postCount').innerText = posts;

                prompt.value = "";
                btn.innerText = "Post to Feed ✨";
                btn.disabled = false;
                showTab('home-page');
                window.scrollTo(0,0);
            }, 1200);
        }
    </script>
</body>
</html>
