<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskGram AI - Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-200">
        <div class="p-4 border-b border-gray-100 text-center">
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 bg-clip-text text-transparent">
                AskGram AI
            </h1>
        </div>

        <div class="p-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Aapka Video Idea Kya Hai?</label>
            <textarea id="userInput" rows="4" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-500 focus:outline-none mb-4" placeholder="Example: Trending reels for shoes store..."></textarea>
            
            <button onclick="generateMagic()" id="magicBtn" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl hover:opacity-90 transition transform active:scale-95">
                Generate Magic ✨
            </button>

            <div id="result" class="mt-6 p-4 bg-gray-50 rounded-xl hidden border border-dashed border-gray-300">
                <p class="text-sm text-gray-800 font-mono" id="aiOutput"></p>
            </div>
        </div>
    </div>

    <script>
        function generateMagic() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('magicBtn');
            const resultBox = document.getElementById('result');
            const output = document.getElementById('aiOutput');

            if(!input) {
                alert("Pehle kuch likhiye!");
                return;
            }

            btn.innerText = "AI is thinking...";
            btn.disabled = true;

            // Abhi ke liye hum dummy AI response dikhayenge
            setTimeout(() => {
                resultBox.classList.remove('hidden');
                output.innerText = "AskGram AI is processing: " + input + "\n\nSuccess! Aapka trending video plan ready hai.";
                btn.innerText = "Generate Magic ✨";
                btn.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
